<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExpoPro - Cinéma</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon.png">
    <style>
        :root {
            --bg-color: #145a32;
            --panel-bg: #145a32;
            --wheel-bg: #1e8449;
            --active-orange: #e67e22;
            --text-muted: #a5b1a8;
            --input-bg: #196f3d; 
            --locked: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: none;
            padding-top: env(safe-area-inset-top, 20px);
        }

        .calculator-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 95%;
            max-width: 500px;
            padding: 10px;
        }

        .calculator {
            display: flex;
            gap: 2px;
            background: var(--panel-bg);
            padding: 20px 5px;
            border-radius: 20px;
            box-shadow: none;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        .column { display: flex; flex-direction: column; align-items: center; width: 65px; }
        .column.wide { width: 135px; }

        .nd-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }
        .nd-star {
            color: var(--active-orange);
            font-size: 1.2rem;
            font-weight: bold;
            visibility: hidden;
        }
        .nd-star.visible { visibility: visible; }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-align: center;
            height: 25px;
        }

        .lock-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            border-radius: 50%;
            width: 28px; height: 28px;
            cursor: pointer;
            margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        .lock-btn.locked {
            border-color: var(--active-orange);
            color: var(--active-orange);
            background: rgba(230, 126, 34, 0.2);
        }

        .arrow-btn {
            background: transparent; border: none;
            color: var(--text-muted); font-size: 1.45rem;
            cursor: pointer; padding: 5px; margin: 2px 0;
            line-height: 1; transition: color 0.2s;
        }
        .arrow-btn:active { color: var(--active-orange); }

        .wheel-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: var(--wheel-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
        }

        .wheel {
            height: 100%;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            pointer-events: none;
        }
        .wheel::-webkit-scrollbar { display: none; }

        .spacer { height: 80px; }

        .wheel-item {
            height: 40px;
            line-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .wheel-item.active {
            color: var(--active-orange);
            font-weight: 900;
            font-size: 1.2rem;
            height: 40px;
            line-height: 40px;
        }

        .selector-line {
            position: absolute;
            top: 80px;
            left: 0; right: 0;
            height: 40px;
            border-top: 2px solid var(--active-orange);
            border-bottom: 2px solid var(--active-orange);
            background: rgba(230, 126, 34, 0.1);
            pointer-events: none;
        }

        .display-wheel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--input-bg);
            height: 200px;
            width: 100%;
            border-radius: 12px;
        }

        .target-selectors {
            display: flex; gap: 8px; margin-bottom: 12px; justify-content: center;
        }

        .target-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            border-radius: 50%; width: 25px; height: 25px;
            cursor: pointer; font-size: 0.7rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .target-btn.active-target {
            border-color: var(--active-orange);
            color: var(--active-orange);
            background: rgba(230, 126, 34, 0.2);
        }

        .input-group { margin: 6px 0; text-align: center; }
        .input-group label { display: block; font-size: 0.55rem; color: var(--text-muted); margin-bottom: 2px; }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: var(--active-orange);
            font-size: 1.1rem; font-weight: bold;
            text-align: center; width: 90%;
        }

        .nd-selector {
            background: var(--panel-bg);
            color: var(--active-orange);
            border: 2px solid var(--active-orange);
            border-radius: 8px;
            font-size: 0.9rem; font-weight: bold;
            padding: 8px; 
            width: 200px;
            text-align: center;
        }

        .tag-zone {
            width: 100%; max-width: 480px;
            background: var(--panel-bg);
            padding: 15px; border-radius: 15px; margin-top: 15px;
            box-shadow: none;
        }

        .tag-input {
            width: 100%; background: var(--input-bg);
            border: 1px solid var(--wheel-bg);
            color: var(--active-orange);
            padding: 10px; border-radius: 8px;
            min-height: 60px; box-sizing: border-box;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            resize: none;
        }

        /* Style de la bulle d'horloge */
        #clock-display {
            background: var(--panel-bg);
            color: var(--active-orange);
            font-size: 1.5rem; /* Double taille */
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            margin-top: 15px;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <div class="nd-wrapper">
            <span class="nd-star" id="nd-star-left">*</span>
            <select id="nd-filter" class="nd-selector"></select>
            <span class="nd-star" id="nd-star-right">*</span>
        </div>

        <div class="calculator">
            <div class="column">
                <div class="label">Aperture</div>
                <button class="lock-btn" id="lock-aperture" onclick="toggleLock('aperture')">🔓</button>
                <button class="arrow-btn" onclick="stepWheel('aperture', -1)">▲</button>
                <div class="wheel-container" id="container-aperture">
                    <div class="selector-line"></div>
                    <div class="wheel" id="wheel-aperture">
                        <div class="spacer"></div><div class="spacer"></div>
                    </div>
                </div>
                <button class="arrow-btn" onclick="stepWheel('aperture', 1)">▼</button>
            </div>

            <div class="column">
                <div class="label">Shutter</div>
                <button class="lock-btn" id="lock-shutter" onclick="toggleLock('shutter')">🔓</button>
                <button class="arrow-btn" onclick="stepWheel('shutter', -1)">▲</button>
                <div class="wheel-container" id="container-shutter">
                    <div class="selector-line"></div>
                    <div class="wheel" id="wheel-shutter">
                        <div class="spacer"></div><div class="spacer"></div>
                    </div>
                </div>
                <button class="arrow-btn" onclick="stepWheel('shutter', 1)">▼</button>
            </div>

            <div class="column">
                <div class="label">EI (ISO)</div>
                <button class="lock-btn" id="lock-iso" onclick="toggleLock('iso')">🔓</button>
                <button class="arrow-btn" onclick="stepWheel('iso', -1)">▲</button>
                <div class="wheel-container" id="container-iso">
                    <div class="selector-line"></div>
                    <div class="wheel" id="wheel-iso">
                        <div class="spacer"></div><div class="spacer"></div>
                    </div>
                </div>
                <button class="arrow-btn" onclick="stepWheel('iso', 1)">▼</button>
            </div>

            <div class="column wide">
                <div class="label">Exposure Data</div>
                
                <div class="target-selectors">
                    <button class="target-btn" id="target-aperture" onclick="toggleTarget('aperture')">A</button>
                    <button class="target-btn" id="target-shutter" onclick="toggleTarget('shutter')">S</button>
                    <button class="target-btn" id="target-iso" onclick="toggleTarget('iso')">E</button>
                </div>

                <div class="display-wheel">
                    <div class="input-group"><label>EV</label><input type="number" step="0.001" id="input-ev"></div>
                    <div class="input-group"><label>LUX</label><input type="number" step="0.001" id="input-lux"></div>
                    <div class="input-group"><label>FOOTCANDLES</label><input type="number" step="0.001" id="input-fc"></div>
                </div>
            </div>
        </div>

        <div class="tag-zone">
            <textarea id="tag-input" class="tag-input"></textarea>
        </div>
        
        <div id="clock-display"></div>
    </div>

<script>
    const apertureData = [];
    const stopLabels = ["0.25","0.3","0.4","0.5","0.7","0.8","0.9","1.0","1.1","1.2","1.4","1.6","1.8","2.0","2.2","2.5","2.8","3.2","3.5","4.0","4.5","5.0","5.6","6.3","7.1","8.0","9.0","10","11","13","14","16","18","20","22","25","29","32","45","64","90","128"];
    
    stopLabels.forEach(label => {
        let val = parseFloat(label);
        const stopsRounded = Math.round(Math.log2(val * val) * 3) / 3;
        const exact = Math.pow(2, stopsRounded / 2);
        apertureData.push({ display: label, exact: exact });
    });

    const shutterData = ["30", "15", "8", "4", "2", "1", "1/2", "1/4", "1/8", "1/15", "1/24", "1/30", "1/48", "1/50", "1/60", "1/96", "1/100", "1/120", "1/250", "1/500", "1/1000", "1/2000", "1/4000", "1/8000", "1/16000"];
    const isoData = [3, 6, 12, 25, 50, 64, 80, 100, 125, 160, 200, 250, 320, 400, 500, 640, 800, 1000, 1250, 1600, 2000, 2500, 3200, 4000, 5000, 6400, 12800, 25600, 51200, 102400, 204800, 409600];
    
    const ndValues = [];
    for (let i = 0; i <= 3.01; i += 0.15) {
        ndValues.push({ val: i.toFixed(2), stops: (i/0.3).toFixed(1) });
    }

    let lockedWheel = null;
    let targetWheelForManual = null; 
    let currentIndex = { aperture: 16, shutter: 14, iso: 13 };
    let currentNDIndex = 0;
    let targetEV = 0;
    let isProgrammaticScroll = false;
    let isDragging = false;

    function populate() {
        const wheels = { aperture: apertureData.map(d => d.display), shutter: shutterData, iso: isoData };
        Object.keys(wheels).forEach(id => {
            const w = document.getElementById(`wheel-${id}`);
            const endSpacer = w.querySelector('.spacer:last-child');
            wheels[id].forEach((val) => {
                const div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = val;
                w.insertBefore(div, endSpacer);
            });
            setupDrag(id);
            w.onscroll = () => handleScroll(id);
        });

        const nd = document.getElementById('nd-filter');
        ndValues.forEach((v, i) => {
            const label = i === 0 ? 'No ND' : `ND ${v.val} (+${v.stops} stops)`;
            nd.innerHTML += `<option value="${i}">${label}</option>`;
        });
        nd.onchange = (e) => {
            currentNDIndex = parseInt(e.target.value);
            const isActive = currentNDIndex !== 0;
            nd.style.fontWeight = isActive ? 'bold' : 'bold';
            document.getElementById('nd-star-left').classList.toggle('visible', isActive);
            document.getElementById('nd-star-right').classList.toggle('visible', isActive);
            nd.style.fontWeight = isActive ? '900' : 'bold';
            solveFor('aperture', targetEV);
            update();
        };
    }

    function stepWheel(id, direction) {
        const count = id === 'aperture' ? apertureData.length : id === 'shutter' ? shutterData.length : isoData.length;
        let newIdx = currentIndex[id] + direction;
        
        if (newIdx >= 0 && newIdx < count) {
            currentIndex[id] = newIdx;
            scrollWheel(id, newIdx);
            
            if (lockedWheel) {
                const free = ['aperture', 'shutter', 'iso'].find(x => x !== lockedWheel && x !== id);
                if (free) solveFor(free, targetEV);
            }
            update();
        }
    }

    function handleScroll(id) {
        if (isProgrammaticScroll) return;
        const w = document.getElementById(`wheel-${id}`);
        const idx = Math.round(w.scrollTop / 40);
        if (currentIndex[id] !== idx && idx >= 0) {
            currentIndex[id] = idx;
            if (lockedWheel) {
                const free = ['aperture', 'shutter', 'iso'].find(x => x !== lockedWheel && x !== id);
                if (free) solveFor(free, targetEV);
            }
            update();
        }
    }

    function setupDrag(id) {
        const container = document.getElementById(`container-${id}`);
        const wheel = document.getElementById(`wheel-${id}`);
        let startY, scrollT;

        const start = (e) => { 
            isDragging = true; 
            wheel.style.pointerEvents = "auto";
            startY = (e.pageY || e.touches[0].pageY); 
            scrollT = wheel.scrollTop; 
        };
        const end = () => { 
            isDragging = false; 
            setTimeout(() => { wheel.style.pointerEvents = "none"; }, 50);
        };
        const move = (e) => {
            if (!isDragging) return;
            const y = (e.pageY || e.touches[0].pageY);
            wheel.scrollTop = scrollT - (y - startY);
            e.preventDefault();
        };

        container.onmousedown = start; container.ontouchstart = start;
        window.onmouseup = end; window.ontouchend = end;
        container.onmousemove = move; container.ontouchmove = move;
    }

    function getEV() {
        const N = apertureData[currentIndex.aperture].exact;
        const tStr = shutterData[currentIndex.shutter];
        const t = tStr.includes('/') ? eval(tStr) : parseFloat(tStr);
        const iso = isoData[currentIndex.iso];
        const ndStops = parseFloat(ndValues[currentNDIndex].stops);
        
        const camEV = Math.log2((N * N) / t) - Math.log2(iso / 100);
        return camEV + ndStops;
    }

    function update(evFromInput) {
        const ev = evFromInput !== undefined ? evFromInput : getEV();
        const lux = 2.5 * Math.pow(2, ev);
        const fc = lux / 10.764;

        document.getElementById('input-ev').value = ev.toFixed(3);
        document.getElementById('input-lux').value = lux.toFixed(3);
        document.getElementById('input-fc').value = fc.toFixed(3);

        if (evFromInput === undefined && !lockedWheel) targetEV = ev;
        
        ['aperture', 'shutter', 'iso'].forEach(id => {
            const items = document.querySelectorAll(`#wheel-${id} .wheel-item`);
            items.forEach((item, i) => item.classList.toggle('active', i === currentIndex[id]));
        });
    }

    function solveFor(id, tEV) {
        let best = 0, minDiff = Infinity;
        const count = id === 'aperture' ? apertureData.length : id === 'shutter' ? shutterData.length : isoData.length;
        
        for(let i=0; i < count; i++) {
            currentIndex[id] = i;
            let diff = Math.abs(getEV() - tEV);
            if(diff < minDiff) { minDiff = diff; best = i; }
        }
        currentIndex[id] = best;
        scrollWheel(id, best);
    }

    function scrollWheel(id, idx) {
        isProgrammaticScroll = true;
        const w = document.getElementById(`wheel-${id}`);
        w.scrollTo({ top: idx * 40, behavior: 'smooth' });
        setTimeout(() => { isProgrammaticScroll = false; update(); }, 150);
    }

    function toggleLock(id) {
        if(lockedWheel === id) {
            lockedWheel = null;
            document.getElementById(`lock-${id}`).textContent = '🔓';
            document.getElementById(`lock-${id}`).classList.remove('locked');
        } else {
            if(lockedWheel) toggleLock(lockedWheel);
            lockedWheel = id;
            targetEV = getEV();
            document.getElementById(`lock-${id}`).textContent = '🔒';
            document.getElementById(`lock-${id}`).classList.add('locked');
        }
    }

    function toggleTarget(id) {
        if (targetWheelForManual === id) {
            targetWheelForManual = null;
            document.getElementById(`target-${id}`).classList.remove('active-target');
        } else {
            if (targetWheelForManual) {
                document.getElementById(`target-${targetWheelForManual}`).classList.remove('active-target');
            }
            targetWheelForManual = id;
            document.getElementById(`target-${id}`).classList.add('active-target');
        }
    }

    document.getElementById('input-ev').onkeydown = (e) => {
        if (e.key === 'Enter') {
            e.target.blur();
            let v = parseFloat(e.target.value);
            if (!isNaN(v)) { 
                targetEV = v; 
                update(v);
                if (targetWheelForManual) solveFor(targetWheelForManual, v); 
            }
        }
    };
    document.getElementById('input-lux').onkeydown = (e) => {
        if (e.key === 'Enter') {
            e.target.blur();
            let lux = parseFloat(e.target.value);
            if (lux > 0) { 
                let ev = Math.log2(lux/2.5); 
                targetEV = ev; 
                update(ev);
                if (targetWheelForManual) solveFor(targetWheelForManual, ev); 
            }
        }
    };
    document.getElementById('input-fc').onkeydown = (e) => {
        if (e.key === 'Enter') {
            e.target.blur();
            let fc = parseFloat(e.target.value);
            if (fc > 0) { 
                let ev = Math.log2((fc*10.764)/2.5); 
                targetEV = ev; 
                update(ev);
                if (targetWheelForManual) solveFor(targetWheelForManual, ev); 
            }
        }
    };

    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock-display').textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    populate();
    setTimeout(() => {
        scrollWheel('aperture', 16); 
        scrollWheel('shutter', 14); 
        scrollWheel('iso', 13);    
    }, 200);

</script>
</body>
</html>
